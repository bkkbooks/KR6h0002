body:
  text: 西晉月氏三藏竺法護譯八總持品第二十三時有菩薩名師子英在會中坐問總𠢕王菩薩唯族姓子菩薩所立於何總持而皆受持諸佛所説所演經典不可窮盡則以善教悅可衆生靡不忽然如冥覩明總𠢕王菩薩報師子英菩薩所住此八總持悅可衆生使得開達其慧無窮何謂為八有總持一名淨光音二名無盡法藏三名無量退進四名海印意五名蓮華嚴六名入無礙印七名入分別辨八名建立佛莊嚴是為八菩薩住此有所暢説悅可衆生時師子英復問總𠢕王菩薩仁族姓子寧可屈意垂哀一切復重解此八總持誼廣演其旨設諸菩薩聞此總持所得辨才必當勤學總𠢕王曰族姓子聽今為仁説八總持誼廣散所歸何謂淨光音假使菩薩住此總持其所入門無所罣礙甚為鮮潔歸乎堅要其意正立而説經典其音通徹聞一佛國或二或三或四或五或十二十三十四十五十諸佛國土或百或千其音教告諸佛國土或十二十三十四十五十百千億諸佛國土聞其音教或復通徹無量無際諸佛國土從意所樂欲令音教通乎幾何諸佛國土多少無極悉能堪任恣意所欲一師子坐而為十方一切衆生講説經法欲令二十里衆人得聞或三十里或一須彌或至梵天從其衆生本意應説處師子床建立其志為諸衆生講説經法悅可其心靡不開解身適處於師子座已十方諸佛皆現其身諸佛説法皆得聞之適聞已後得總持力悉識念之未曾復忘以斯法典解達其誼其所説法諸可聽受無能遏斷入於一文音響之事皆能演説一切文字普入諸響諸因緣句入文字故入無量門説於諸法無有來相諸法無處無所住故諸法自然無反覆故諸法懷來無所到故用清淨故諸法無根用無有處所生無故諸法無邊無所成故諸法無盡無所住故諸法無生無所行故諸法不起無所作故諸法不有無因緣故諸法不亂無等御故諸法不滅無有生故諸法無行無所願故諸法無戲無有想念應不應故諸法無言永入無行故諸法無教用有所説而有失故諸法無瞋無有恨故諸法無想無所著故諸法無念無有虛故諸法無猗無所望故諸法無誨於空等故諸法無辭用無思故諸法無究無師主故諸法無生無有教故諸法悉淨無有來故諸法無我我自然故諸法無人甚清淨故諸法無壽無長存故諸法無命入於誼故諸法實空於內寂故諸法無想其本際者無有際故諸法無願無所受故諸法無行用無為故諸法無為以越所起章句行故諸法不堅無所依故諸法無著無所習故諸法自然用無身故諸法無作所作淨故諸法無業無所入故諸法無報無所合故諸法無合無所壞故諸法無捨無所取故諸法無眴不可捉故諸法無獲無所指故諸法無觸無所造故諸法無漏無流處故諸法無有志無成故諸法清淨無番黨故諸法無屬無若干故諸法無色四大無常故諸法無痛無所遭故諸法無想越衆念故諸法無行離諸欲故諸法無識無所慕故諸法無界如空等故諸法無捨越諸界故諸法無境無所由故諸法無貪無所想故諸法無像無處所故諸法無形無所降故諸法無濁除諸憒故諸法無憶無所執故諸法無想無有二故諸法無岸度界迹故諸法無怙離所在故諸法無常緣不淨故諸法無名無所怪故諸法無雜各隨行故諸法無住無所存故諸法無爛無所燒故諸法無惡離諸惡故諸法如水洗諸垢故諸法無災甚清淨故諸法甚清淨不可數故諸法無計無所著故諸法無求無有動故諸法無搖不可震故諸法無為與空等故諸法虛無無所為故諸法無根無所行故諸法無現無所曜故諸法無照捨諸明故諸法無比無有邪故諸法無偏等慌惚故諸法無冥無所視故諸法無晃無部黨故諸法無罪離於舋故諸法歌頌作善業故諸法入虛用侵欺故諸法無進無所立故諸法無見無有類故諸法無有嘗無有味故諸法無柔無細滑故諸法無識無諸法故諸法無緣離心意識故諸法無惟道平等故諸法本淨以滅諸入不復生故如是族姓子菩薩已逮淨光音於諸因緣文字章句咨嗟其誼若於一劫復過一劫頒宣經典不捨諸緣文字章句隨時所應不以為難取要言之一切諸文各各諸字以一一文為衆説法於彼文字而無窮盡善住法眼諦演辭誼其言粲麗於是菩薩住於總持究暢清淨威儀隨時辨才鮮明其心顯曜遵修慈心其所布施亦復清淨法施衣食俱無所吝其戒清淨行無缺漏忍辱清淨心不懷害精進清淨造安隱業一心清淨寂然無冥智慧清淨捨於暗昧廣有所照其業清淨無所違失其目清淨三眼無垢其耳清淨得天耳聽聞諸如來所講説業其鼻清淨聞於如來戒法之香其舌清淨無可意味志道法味其身清淨所生一切不為胎垢之所沾污其心清淨善權隨時普入諸法其色清淨相好莊嚴所聞清淨悅耳之音而無亂響其香清淨戒聞施香所見被熏其味清淨味味復味成大人相細滑清淨手腳柔軟猶如幼童其法清淨逮法光明其意清淨所聞經法懷憶不忘其志清淨越魔徑路行步清淨普入深妙無極經典菩薩已住於此總持自恣從志告誨教授幾何佛土光明所照其數亦然又其光明演出一切十方諸佛所演法教以用逮致於此總持因得殊特無言辭故是族姓子淨光音總持也所可演出若有所入所可稱説不可限量此淨音總持分別所趣不可思議言辭無極所決無限所搖方面曠而無際入無罣礙佛言族姓子何謂無盡法藏總持謂色無盡以色無常故曰無盡説色無常以色苦故亦説苦惱色無我故亦説無我色寂然故亦説寂然色恍惚故亦説恍惚色如沫故亦説聚沫色如幻故亦復説幻色如野馬故亦説野馬色如水月故亦説水月色如夢故亦説夢色如呼響故亦説呼響色如形影故亦説形影色如照面像故亦説面像色無有故亦説無有色無學故亦説無學色無究竟故亦説無究竟其色空故亦説於空色無想故亦説無想色無願故亦説無願色無行故亦説無行色無生故亦説無生色無起故亦説無起色本自然故亦説本自然色用本無故亦説本無色過去自然故亦説過去自然色當來自然故亦説當來自然色中自然故亦説中自然色憺怕故亦説淡泊色靜默故亦説靜默色無遊故亦説無遊色無戲故亦説無戲色不可思議故亦説不可思議色無貌故亦説無貌色無體故亦説無體色無人故亦説無人色無壽故亦説無壽色無命故亦説無命色無養故亦説無養色愚騃故亦説愚騃色不仁故亦説不仁色無神故亦説無神色如束薪故亦説束薪色如草木牆壁瓦石之類故亦説草木牆壁瓦石之類色如誑相故亦説誑相色為四大故亦説四大色無聲故亦説無聲色無教故亦説無教色不可得故亦説不可得色念淨故亦説念淨色緣起故亦説緣起色無斷故亦説無斷色非常故亦説非常色如屋故亦説如屋色無痛故亦説無痛色從罪福生故亦説罪福色法界苦故亦説法界色住法界故亦説住法界色於本際法界而無動故亦説本際色無我故亦説無我色無受故亦説無受色無載故亦説無載色無念故亦説無念色無怯故亦説無怯色無量故亦説無量色無邊故亦説無邊其色於道本清淨故亦説道淨色空等故亦説空等色於泥洹本清淨故亦説泥洹清淨舉要言之五陰六衰諸法諸名身形句迹徑路偏章及諸識身悉入一音之所顯曜説無盡慧計是四大寶藏之篋所咨啓慧亦不可盡其寶藏篋聖法經典亦復遊入於無盡慧所頒宣智是為無盡法藏之總持也一切諸所講説宣傳若於一劫復過一劫咨嗟此德無盡法藏猶不可盡佛告族姓子何謂無量退進總持於彼回旋斷絶計常而反其流十二緣起從無明緣而自致行從行致識從識致名色從名色致六入從六入致更從更致愛從愛致痛從痛致受從受致有從有致生從生致老病死從死致於哀泣憂戚所不可意從致五陰大惱之患已除無明行識名色六入更愛痛受有生老病死啼哭愁戚不可陰意大患永除彼從無量宣無限門入於無底是故名曰無量退進之總持也亦受亦捨故曰回旋無受無捨此之謂也亦起亦滅所以回旋不起不滅此之謂也與塵勞合而致諍訟所以回旋反本清淨無著放逸此之謂也於一切法而有所行受應不應念與不念所以回反無想無念無應不應此之謂也因緣諸見所以回反斷因緣見此之謂也名之與色所以回反無名無色此之謂也有為無為所以回反淨於三場此之謂也有內有外所以回反不住於識此之謂也罪福報應所以回反無罪福報此之謂也善與不善所以回反永無所行不處善惡此之謂也有漏無漏所以回反無有二事此之謂也殃舋所蔽塵勞之冥所以回反本淨自然此之謂也計我不我所以回反其際清淨此之謂也生死泥洹所以回反諸法泥洹其源靜然此之謂也是族姓子説無量總持進退無底若有菩薩住是無量退進總持志無所生達法無起於無央數百千劫中講説經典不能究盡總持之慧其誼微妙此無量退進總持若入中慧有所宣暢則能覺了清淨道門照曜幽冥靡不亘然佛告族姓子何謂海印意總持猶族姓子諸四方域世界之中諸有形色又其像貌山谷樹木諸所生草衆藥之類所有形貌日月光明明珠水曜焰電諸有像貌州城大邦郡國縣邑居舍屋宅所有像貌園觀浴池川流泉源入流行色生活之業自覩形像好醜善惡中上下貌一切諸色及與歸之皆依大海而不別異是謂大海菩薩若住此海印意總持等印一切衆生之身亦復等演文字之教以等心印而印衆生十力諸佛口演所宣無極大法此典皆從菩薩口出佛印見印所説法者欣而無限講諸法印慧無所印所可講説悉如來印分別衆諦其無印者永無所行心自然寂其離印者得離欲法清淨之行其度印者所演究竟靡所不通其號印者皆宣名物各各暢了其樂印者除去欲貪放逸恩愛其十印者具足十力其被恐印者淨除諸意其燒吒印者捨於燒熱其六印者成六神通其左披印者棄捐左道其審印者説於真諦其如印者所行如實其哆印者蠲除一切諸所根本其迦印者離所作業其娑印者宣暢至誠其現勢力故其生印者度生老死故其志印者謂意清淨故其界印者不壞法界故其寂印者具足憺怕故其虛印者虛靜空無無不可盡故其盡印者消化盡想慧無起故其立印者覺意諦住故其知印者別知一切衆生類故其普印者而悉頒宣諸所興衰其有印者覺了分別所有無有其貪印者消除貪淫瞋恚愚癡之忌難也其己印者己身已通而成正覺其自印者身自解故其旦印者旦自釋捨諸所猗相其數印者滅遣根源其處印者則於處處如有悉知其無印者無有若干其果印者逮得果證其陰印者除諸陰蓋其疾印者離邪疾故其施印者得成施戒香熏故其堅印者已逮斷堅剛強性故其究印者究暢文字攄其根源如是族姓子菩薩説法演若干文悉知一切文字印説是為海印入總持門佛告族姓子何謂蓮華嚴總持菩薩大士若入衆會在所住處輒為説經設有所宣于時於彼即生蓮華其色殊妙菩薩適坐於蓮華逮虛空中則雨蓮華又諸蓮華各各演出若干種音講説經法唯説深誼無有雜句嚴飾之教攀引典喻正典上要分別誼歸十二部經一曰聞經二曰得經三曰聽經四曰分別經五曰現經六曰應時經七曰生經八曰方等經九曰未曾有經十曰譬喻經十一曰住解經十二曰行經其所演法若有聽者輒盡衆苦菩薩如是自然精進不釋常定于時蓮華所演經典適斷衆苦便行佛事又其菩薩一切毛孔悉出光明化為蓮華諸蓮華上各化菩薩詣於十方不可涯底無數佛土奉現諸佛是族姓子名曰蓮華嚴入總持門佛復告族姓子何謂入無礙總持門假使不捨一言辭已至二三四乃至乎千所生之處常不忘之或億百千種種之説悉能識念為衆宣暢世世不忽諸根和悅顏色殊絶與衆超異悅可衆人無有恨亂或能所説聞於無量江河沙等諸佛剎土或能通暢如佛國塵諸佛國土於是所演諸法門者隨時方便又彼法門一時悉遍諸佛國土滿中塵數諸世界也或二三四或五至十百千無量所説應聲亦無所著則無所住其音柔和合衆人心辭美隨時其誼雅妙不失其節莫不欣豫入無礙門佛復告族姓子何謂入分別總持曉了其誼所宣旨慧而不可盡分別法者所宣正慧亦不可想隨時分別所説明慧亦不可窮分別辨者所宣正智亦無涯底菩薩已獲如此慧者其於東方所有衆生悉能合會集在一處各各隨意言語各異音聲若干從其宜便所知多少來難菩薩悉能發遣申暢其誼南方西方北方四隅上下亦復如是來難菩薩各各問誼一時各各盡為發遣隨音清濁若干種言悉得開解各隨本心而得入道各聞其言音不錯亂則以一音入無數音以無數音則入一音是為名曰分別莊嚴總持佛告族姓子何謂建立佛想總持若有菩薩得此總持處大法座在於衆中常於虛空值其頂上變交露帳化佛處上紫磨金色三十二相衆好嚴身自承其德頂近如來右手所在化佛舉手適著頭上應時菩薩其身即變成為佛形莊嚴相好建立其口言辭如佛被蒙其意亦如佛意適能成就建如是法則入一切衆會心念從其本行而為宣法一日二日至乎五日半月一月半歲一歲五百千歲從意自恣至乎無窮不可計歲離於飲食為諸衆生而講説經所宣經典而無有窮盡其身不懈心亦不怠悉是如來之所建立聖感所接彼則成致於四大慧何謂四一曰慧解一切衆生志操二曰分別章句靡不通暢三曰則以聖智所宣無窮四曰則從其人本而所學乘了其意歸而解説法是族姓子如來相建立總持所入門者有所宣説又此總持可演誼不可稱載無有邊際通佛境界爾時總𠢕王菩薩覩於如來説如斯誼以讚頌曰安住已宣説於八總持行此乘所宣獲分別得解暢説億載經典辭不得邊際其誼所分別説者無所損佛音甚柔和其聲微妙快宣告江河沙無量千佛土衆生得聽聞逮成得滅度此總持清淨所暢音無際講説無數劫其法無窮盡一句之言辭宣布不可説一切諸文藻智者得隨時是為法篋藏覺意無涯底皆棄諸非受其行甚清淨亦不著中間不隨退轉界斯勇普惟法專精而奉行其逮得總持蠲除衆根源其於四域界諸所有形類一切悉等印江海無思惟其有逮得此海印之總持彼行者印門所説無思議若在中衆會大人講説法逮於虛空中廣雨諸蓮華又諸蓮華者演億千法教蓮華嚴總持清淨德若茲一音所演句二三及五六諸音各各聞聲而不錯亂千億百那術言辭不可盡有逮得總持所覺無罣礙其所宣辨才法誼説應時十方衆生來各各共難問悉為發遣之決了所疑律其逮得總持意所覺如此其大人正士若坐於高床諸佛以右手而摩著頂上其人得辨才如佛無有異用逮此佛化妙上總持故假使此菩薩逮成總持者彼意所懷德無際不可念講説億千劫猶如江河沙咨嗟其功德境界不可盡如蓮華自然踊處於三世堅住如須彌所部無能動假使有逮得無上之總持其慧則普流周遍於三世若在衆會中勇猛如師子調御諸外學降伏令成就假使有逮得此上之總持在所遊行處悉棄諸恐懼其光踰大明所照而隨時其行若如水洗除衆垢穢其行亦如火無相無有念其行亦如風不著諸境界其行亦如醫療治諸疾厄隨時給法藥湯火而救濟其有逮得者極上妙總持彼慧無瞋恨隨根而解説其行如月明能除夜衆冥心等光明正而演大暉曜其有逮得此總持最無覺衆生來觀瞻視之無厭極其行喻日光照曜於暗冥開三界衆生使得其悟解若逮得於此最上之總持枯竭於衆庶愛欲塵勞源其行亦如王典領其國土如息意王教以法施所聞其有逮得此最上之總持一切無所受不著於諸有其行猶如龍意強有神變興雲雨衆生亦復出電焰其有逮得此最上之總持此放諸法雨消滅衆惱熱其行如天帝不為諸容色而見所迷惑心廣而思法其有逮得此最上之總持諸來衆會者悉瞻戴其顏其慈之所行等遊如梵天一切無等倫來生於此世其有逮得此最上之總持彼生於梵天所在常清淨則成大五通常與衆超異遊百千佛土難計無思議其有逮得此最上之總持彼供養十方無央數諸佛諸佛所咨嗟隨所止方面悉共愍哀之念之如一子其有逮得此最上之總持計如是不久當逮佛功勳其辨甚廣遠所演無窮盡説種種微妙無數諸經典其有逮得此最上之總持嚴行如華鬘辨才如流泉在衆意堅強所覺而通暢其慧無涯底所行如虛空其有逮得此最上之總持彼則無憍慢離諛諂自大其智慧善權所遊而自恣能精進奉行當修慈愍哀其有逮得此最上之總持一切皆蠲除有為之瑕穢知衆生言辭所説之善惡了衆人所好一切諸根行其有逮得此最上之總持本所可宣暢其誼不可盡精勤神定意諸根及五力覺意路如是其寂然最上其有逮得此最上之總持彼則觀諸法所獲甚清淨於諸度無極已逮至彼岸意強而明達慧了諸四思其逮得於此最上之總持其人自然解安住諸所行寂然成淡泊仁和無放逸威儀禮節行分別住安諦其有逮得此最上之總持其人未曾有不與諸塵勞以成如法幻志性離瑕穢所在胎生處不能垢所染其有逮得此最上之總持則住於蓮華立在諸佛前其人身口意威神無缺漏普興一切慧周流歸衆生其有逮得此最上之總持諸佛所建化説法而自立已成大智慧為衆生行道於無數劫中歎德不可窮其有逮得此最上之總持若有欲歎譽無能得源際於是世尊讚總𠢕王菩薩善哉善哉仁快説此咨嗟總持之所入行所以然者此法自然無所依怙不仰他人入已曾往過去諸佛更問深妙總持門故以是之故汝族姓子當作斯觀等無有異
